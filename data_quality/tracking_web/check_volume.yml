scans:
  click_events_volume_check:
    display_name: "Click Event Volume Check Today"
    resource_path: "projects/analystack/datasets/dataform/tables/click_events_latest"
    schedule: "0 * * * *" # Ogni ora
    # Il filtro per "oggi" rimane qui
  
    rules:
      - dimension: VALIDITY
        # Usiamo SQL invece di row_count_expectation per evitare il bug
        sql_assertion:
          sql_statement: |
            SELECT COUNT(*) FROM `analystack.dataform.click_events_latest`